<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Look</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Mulish:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2137;
      --gray-600: #5a6480;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Mulish', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: #f7f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card { text-align: center; max-width: 440px; }
    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: -.025em;
      margin-bottom: 12px;
    }
    p { font-size: .97rem; color: var(--gray-600); line-height: 1.65; font-weight: 300; }
    .divider { width: 48px; height: 2px; background: var(--navy); margin: 24px auto; border-radius: 2px; opacity: .3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Second Look</h1>
    <div class="divider"></div>
    <p>This platform is for loan officer personalized pages.<br />If you have a link from your advisor, please use that URL directly.</p>
  </div>
</body>
</html>
