# netlify.toml
# Configuration for the Loan Review multi-LO platform

[build]
  publish   = "."
  command   = "npm install"
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Routing — all /second-look/[slug] paths serve the same index.html
# JavaScript reads the slug from the URL
[[redirects]]
  from   = "/loan-review/*"
  to     = "/loan-review/index.html"
  status = 200

# Catch-all fallback
[[redirects]]
 from   = "/loan-review/*"
  to     = "/loan-review/index.html"
  status = 200
